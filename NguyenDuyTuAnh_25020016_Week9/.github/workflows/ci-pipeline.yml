name: CI/CD Backend Pipeline

# 1. Kích hoạt (Trigger) khi có push hoặc pull request vào nhánh main
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest # Chạy trên máy ảo Linux của GitHub

    steps:
      # Bước 1: Kéo code từ repo về máy ảo
      - name: Checkout repository
        uses: actions/checkout@v4

      # Bước 2: Cài đặt môi trường Java 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven' # Cache thư viện để các lần chạy sau nhanh hơn

      # Bước 3: Chạy vòng đời Maven (Build, Test, Package)
      # Cờ -B (Batch mode) giúp log gọn gàng hơn, không in rác progress bar
      - name: Run Maven Build & Tests
        run: mvn -B clean package

      # Bước 4: Lưu trữ file .jar (Artifact) sau khi build thành công
      - name: Upload JAR Artifact
        uses: actions/upload-artifact@v4
        # Chỉ upload nếu bước Maven Build thành công (không có test nào tạch)
        if: success()
        with:
          name: bank-system-build
          path: target/*.jar # Quét và lấy file .jar trong thư mục target
          retention-days: 7 # Lưu file này trên GitHub trong 7 ngày


    strategy:
      matrix:
        os: [ ubuntu-latest, windows-latest, macos-latest ]
      # fail-fast: false giúp CI vẫn chạy các OS khác ngay cả khi 1 OS bị tạch
      fail-fast: false

      # 2. Thay vì gán cứng Ubuntu, ta gán biến OS từ ma trận
      runs-on: ${{ matrix.os }}

      steps:
        - name: Checkout repository
          uses: actions/checkout@v4

        - name: Set up JDK 17
          uses: actions/setup-java@v4
          with:
            java-version: '17'
            distribution: 'temurin'
            cache: 'maven'

        - name: Run Maven Build & Tests
          run: mvn -B clean package

        # Chỉ upload artifact trên Ubuntu để tránh bị upload trùng lặp 3 lần
        - name: Upload JAR Artifact
          uses: actions/upload-artifact@v4
          if: success() && matrix.os == 'ubuntu-latest'
          with:
            name: bank-system-build
            path: target/*.jar
            retention-days: 7